<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>BYM Home Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #050b1a;
      --bg-soft: #0b1631;
      --text: #ebf2ff;
      --hint: #93a6cc;
      --primary: #5b7cff;
      --primary-2: #8b5cf6;
      --secondary-bg: #111f3f;
      --button-text: #ffffff;
      --danger: #ff5a7a;
      --stroke: rgba(155, 184, 255, 0.2);
      --shadow: 0 10px 28px rgba(2, 7, 22, 0.45);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(1200px 600px at 0% 0%, #1a2a5f55 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 20%, #7e4dff33 0%, transparent 60%),
        linear-gradient(180deg, #050b1a 0%, #040913 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 14px;
    }
    .access-denied {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: 700;
      color: var(--danger);
    }

    .screen-wrap {
      position: relative;
      min-height: calc(100vh - 28px);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--stroke);
      box-shadow: 0 0 0 1px rgba(125, 156, 255, 0.04), var(--shadow);
      background: linear-gradient(180deg, #07142d 0%, #060f22 100%);
    }

    .screen {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(500px 260px at 100% 0%, #7c4dff1f 0%, transparent 65%),
        linear-gradient(180deg, #07142d 0%, #060f22 100%);
      padding: 14px 14px 22px;
      overflow: auto;
      opacity: 0;
      transform: translateY(12px) scale(0.99);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .title-small {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--hint);
      font-weight: 500;
    }

    .screen-title {
      margin: 2px 0 14px;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .card {
      border-radius: var(--radius-lg);
      padding: 14px;
      background: linear-gradient(180deg, rgba(19, 35, 72, 0.9) 0%, rgba(15, 28, 58, 0.9) 100%);
      box-shadow: var(--shadow);
      border: 1px solid var(--stroke);
    }

    .balance-row {
      display: none;
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 14px;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stack { display: grid; gap: 10px; }

    .platform-card,
    .action-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(20, 36, 74, 0.9) 0%, rgba(16, 29, 60, 0.9) 100%);
      box-shadow: var(--shadow);
      padding: 14px;
      color: var(--text);
      cursor: pointer;
    }

    .platform-card.active {
      border-color: rgba(149, 120, 255, 0.7);
      background:
        linear-gradient(90deg, rgba(139, 92, 246, 0.2), rgba(91, 124, 255, 0.2)),
        linear-gradient(180deg, rgba(20, 36, 74, 0.92) 0%, rgba(16, 29, 60, 0.92) 100%);
      box-shadow: 0 0 0 1px rgba(149, 120, 255, 0.18), var(--shadow);
    }

    .platform-card.disabled {
      opacity: 0.65;
      filter: grayscale(0.3);
      cursor: not-allowed;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .name {
      font-size: 17px;
      font-weight: 600;
    }

    .soon {
      font-size: 12px;
      color: var(--hint);
      border-radius: 999px;
      padding: 3px 8px;
      background: color-mix(in srgb, var(--text) 6%, transparent);
    }

    .icon { font-size: 20px; }

    .desc {
      margin-top: 5px;
      font-size: 13px;
      color: var(--hint);
      line-height: 1.3;
    }

    .btn-back,
    .btn-main,
    .btn-soft,
    .btn-danger {
      border: none;
      border-radius: var(--radius-md);
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .btn-back {
      width: auto;
      padding: 9px 12px;
      font-size: 14px;
      color: #dce7ff;
      background: linear-gradient(180deg, rgba(66, 84, 151, 0.5), rgba(48, 66, 130, 0.5));
      border: 1px solid var(--stroke);
    }

    .btn-main {
      background: linear-gradient(90deg, var(--primary-2) 0%, var(--primary) 100%);
      color: var(--button-text);
      box-shadow: 0 10px 24px rgba(93, 112, 255, 0.35);
    }

    .btn-soft {
      background: linear-gradient(180deg, rgba(20, 36, 74, 0.9) 0%, rgba(16, 29, 60, 0.9) 100%);
      color: var(--text);
      border: 1px solid var(--stroke);
    }

    .btn-danger {
      background: linear-gradient(180deg, rgba(63, 23, 44, 0.95) 0%, rgba(46, 17, 33, 0.95) 100%);
      color: var(--danger);
      border: 1px solid rgba(255, 90, 122, 0.35);
    }

    .form-wrap {
      padding-bottom: 84px;
    }

    .label {
      margin: 12px 0 7px;
      font-size: 13px;
      color: #a8bbe1;
      font-weight: 600;
    }

    select,
    textarea {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(14, 28, 59, 0.9) 0%, rgba(12, 24, 51, 0.9) 100%);
      color: var(--text);
      font-size: 15px;
      padding: 12px;
      outline: none;
    }

    select:focus,
    textarea:focus {
      border-color: rgba(130, 148, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(110, 134, 255, 0.18);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .sticky-submit {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      max-width: 560px;
      margin: 0 auto;
      padding: 10px;
      background: linear-gradient(180deg, rgba(5, 11, 26, 0.86) 0%, rgba(5, 11, 26, 0.95) 100%);
    }

    .loader-wrap {
      min-height: 58vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .pulse {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(126, 116, 255, 0.2);
      position: relative;
      margin: 0 auto 18px;
    }

    .pulse::before,
    .pulse::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(131, 151, 255, 0.55);
      animation: pulse 1.8s ease-out infinite;
    }

    .pulse::after { animation-delay: 0.8s; }

    @keyframes pulse {
      0% { transform: scale(0.92); opacity: 0.8; }
      80% { transform: scale(1.45); opacity: 0; }
      100% { opacity: 0; }
    }

    .loading-title {
      font-size: 20px;
      margin: 0 0 6px;
    }

    .loading-sub {
      margin: 0;
      color: var(--hint);
      font-size: 14px;
    }

    .result-image {
      width: 100%;
      border-radius: var(--radius-lg);
      display: block;
      background: var(--secondary-bg);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .result-actions {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .error {
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
      font-size: 14px;
    }

    .global-error {
      background: rgba(255, 90, 122, 0.12);
      border: 1px solid rgba(255, 90, 122, 0.35);
      color: var(--danger);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 420px) {
      .screen { padding: 12px 12px 20px; }
      .sticky-submit { left: 12px; right: 12px; bottom: 12px; }
      .screen-title { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div id="access-denied" class="access-denied">Доступ запрещён</div>
  <div class="app">
    <div class="screen-wrap">
      <section id="screen-main" class="screen active">
        <div class="global-error" data-global-error></div>
        <h1 class="title-small">BYM Content Factory</h1>
        <div id="balance-row" class="balance-row card">
          <span id="balance-openrouter"></span>
          <span id="balance-kieai"></span>
        </div>
        <h2 class="screen-title">Платформы</h2>
        <div class="stack">
          <button id="go-pinterest" class="platform-card active">
            <div class="row"><span class="name">Pinterest</span><span class="icon">📌</span></div>
            <div class="desc">Создание интерьерного контента</div>
          </button>
          <button class="platform-card disabled" disabled>
            <div class="row"><span class="name">Instagram</span><span class="soon">скоро</span></div>
            <div class="desc">Публикации и визуалы для ленты</div>
          </button>
          <button id="go-telegram" class="platform-card active">
            <div class="row"><span class="name">Telegram</span><span class="icon">✈️</span></div>
            <div class="desc">Контент для канала и постов</div>
          </button>
          <button class="platform-card disabled" disabled>
            <div class="row"><span class="name">Яндекс.Дзен</span><span class="soon">скоро</span></div>
            <div class="desc">Обложки и статьи</div>
          </button>
        </div>
      </section>

      <section id="screen-platform" class="screen">
        <div class="global-error" data-global-error></div>
        <div class="topbar"><button id="platform-back" class="btn-back">Назад</button></div>
        <h2 class="screen-title">Pinterest</h2>
        <div class="stack">
          <button id="auto-create" class="action-card">
            <div class="name">Авто-создание</div>
            <div class="desc">Система сама соберёт лучший вариант сцены</div>
          </button>
          <button id="manual-open" class="action-card">
            <div class="name">Создать вручную</div>
            <div class="desc">Настройте стиль, крепление, цвет и описание</div>
          </button>
        </div>
      </section>

      <section id="screen-manual" class="screen">
        <div class="global-error" data-global-error></div>
        <div class="topbar"><button id="manual-back" class="btn-back">Назад</button></div>
        <h2 class="screen-title">Ручное создание</h2>

        <div class="form-wrap">
          <label class="label" for="scene-style">Стиль сцены</label>
          <select id="scene-style">
            <option>Простой современный евроремонт (комфорт)</option>
            <option>Дорогой премиум-стиль (люкс)</option>
            <option>Уютный эко-стиль (под дерево и камень)</option>
          </select>

          <label class="label" for="mounting-type">Тип крепления</label>
          <select id="mounting-type">
            <option>Люверсы</option>
            <option>Крючки</option>
          </select>

          <label class="label" for="color">Цвет</label>
          <select id="color">
            <option>Белый</option>
            <option>Бежевый</option>
            <option>Светло-серый</option>
            <option>Тёмно-серый</option>
          </select>

          <label class="label" for="prompt">Описание</label>
          <textarea id="prompt" placeholder="Опишите желаемый интерьер..."></textarea>
        </div>

        <div class="sticky-submit">
          <button id="manual-generate" class="btn-main">Сгенерировать</button>
        </div>
      </section>

      <section id="screen-loading" class="screen">
        <div class="global-error" data-global-error></div>
        <div class="loader-wrap">
          <div>
            <div class="pulse"></div>
            <h2 class="loading-title">Генерируем контент...</h2>
            <p class="loading-sub">Это займёт около минуты</p>
            <div id="error-text" class="error"></div>
          </div>
        </div>
      </section>

      <section id="screen-result" class="screen">
        <div class="global-error" data-global-error></div>
        <h2 class="screen-title">Результат</h2>
        <img id="result-image" class="result-image" alt="Сгенерированное изображение" />
        <div class="result-actions">
          <button id="regenerate" class="btn-danger">Пересоздать</button>
          <button id="download" class="btn-main">Скачать</button>
          <button id="result-back" class="btn-soft">Назад</button>
        </div>
      </section>

      <section id="screen-telegram" class="screen">
        <div class="global-error" data-global-error></div>
        <div class="topbar"><button id="telegram-back" class="btn-back">Назад</button></div>
        <h2 class="screen-title">Telegram</h2>
        <div class="stack">
          <button id="telegram-auto-create" class="action-card">
            <div class="name">Авто-создание</div>
          </button>
          <button id="telegram-manual-open" class="action-card">
            <div class="name">Создать вручную</div>
          </button>
        </div>
      </section>

      <section id="screen-telegram-manual" class="screen">
        <div class="global-error" data-global-error></div>
        <div class="topbar"><button id="telegram-manual-back" class="btn-back">Назад</button></div>
        <h2 class="screen-title">Создать вручную</h2>
        <div class="form-wrap">
          <label class="label" for="telegram-topic">Тема</label>
          <select id="telegram-topic">
            <option>Ремонт</option>
            <option>Дизайн</option>
            <option>Декор</option>
          </select>
          <label class="label" for="telegram-post-type">Тип поста</label>
          <select id="telegram-post-type">
            <option>Полезный</option>
            <option>Рекламный</option>
          </select>
        </div>
        <div class="sticky-submit">
          <button id="telegram-generate-text" class="btn-main">Сгенерировать текст</button>
        </div>
      </section>

      <section id="screen-telegram-text" class="screen">
        <div class="global-error" data-global-error></div>
        <h2 class="screen-title">Текст поста</h2>
        <div id="telegram-text-only" class="card" style="white-space:pre-wrap;"></div>
        <div class="result-actions">
          <button id="telegram-regenerate-text" class="btn-danger">Перегенерировать текст</button>
          <button id="telegram-generate-image" class="btn-main">Сгенерировать картинку</button>
          <button id="telegram-text-back" class="btn-soft">Назад</button>
        </div>
      </section>

      <section id="screen-telegram-result" class="screen">
        <div class="global-error" data-global-error></div>
        <h2 class="screen-title">Текст и картинка</h2>
        <img id="telegram-result-image" class="result-image" alt="Сгенерированное изображение" />
        <div id="telegram-text-with-image" class="card" style="white-space:pre-wrap;"></div>
        <div class="result-actions">
          <button id="telegram-recreate-text" class="btn-danger">Пересоздать текст</button>
          <button id="telegram-recreate-image" class="btn-danger">Пересоздать картинку</button>
          <button id="telegram-publish" class="btn-main">Опубликовать</button>
          <button id="telegram-result-back" class="btn-soft">Назад</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const WEBHOOKS = {
      auto: 'https://bymzavod.online/webhook/pinterest-auto',
      manual: 'https://bymzavod.online/webhook/pinterest-manual',
      regenerate: 'https://bymzavod.online/webhook/pinterest-regenerate',
      status: 'https://bymzavod.online/webhook/pinterest-status',
      balance: 'https://bymzavod.online/webhook/balance',
      telegramAuto: 'https://bymzavod.online/webhook/telegram-auto',
      telegramManualText: 'https://bymzavod.online/webhook/telegram-manual-text',
      telegramManualImage: 'https://bymzavod.online/webhook/telegram-manual-image',
      telegramRegenerateText: 'https://bymzavod.online/webhook/telegram-regenerate-text',
      telegramRegenerateImage: 'https://bymzavod.online/webhook/telegram-regenerate-image',
      telegramStatus: 'https://bymzavod.online/webhook/telegram-status',
      telegramPublish: 'https://bymzavod.online/webhook/telegram-publish'
    };

    const POLL_INTERVAL = 5000;
    const POLL_TIMEOUT = 180000;

    const screens = {
      main: document.getElementById('screen-main'),
      platform: document.getElementById('screen-platform'),
      manual: document.getElementById('screen-manual'),
      loading: document.getElementById('screen-loading'),
      result: document.getElementById('screen-result'),
      telegram: document.getElementById('screen-telegram'),
      telegramManual: document.getElementById('screen-telegram-manual'),
      telegramText: document.getElementById('screen-telegram-text'),
      telegramResult: document.getElementById('screen-telegram-result')
    };

    const el = {
      error: document.getElementById('error-text'),
      scene: document.getElementById('scene-style'),
      mount: document.getElementById('mounting-type'),
      color: document.getElementById('color'),
      prompt: document.getElementById('prompt'),
      img: document.getElementById('result-image'),
      balanceRow: document.getElementById('balance-row'),
      balanceOpenrouter: document.getElementById('balance-openrouter'),
      balanceKieai: document.getElementById('balance-kieai'),
      telegramTopic: document.getElementById('telegram-topic'),
      telegramPostType: document.getElementById('telegram-post-type'),
      telegramTextOnly: document.getElementById('telegram-text-only'),
      telegramTextWithImage: document.getElementById('telegram-text-with-image'),
      telegramImage: document.getElementById('telegram-result-image')
    };

    const globalErrorNodes = Array.from(document.querySelectorAll('[data-global-error]'));

    let currentRecordId = null;
    let currentPrompt = '';
    let currentImageUrl = '';
    let currentText = '';
    let currentPlatform = 'pinterest';

    function checkAccess() {
      return true;
    }

    function applyTelegramTheme() {
      const t = tg?.themeParams || {};
      const root = document.documentElement.style;
      if (t.button_color) root.setProperty('--primary', t.button_color);
      if (t.destructive_text_color) root.setProperty('--danger', t.destructive_text_color);
      root.setProperty('--button-text', t.button_text_color || '#ffffff');
    }

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    function clearGlobalError() {
      globalErrorNodes.forEach(node => {
        node.style.display = 'none';
        node.textContent = '';
      });
    }

    function showGlobalError(message, err) {
      const text = String(message || 'Неизвестная ошибка');
      console.error(text, err || '');
      globalErrorNodes.forEach(node => {
        node.textContent = text;
        node.style.display = 'block';
      });
    }

    async function apiGet(url, params = {}, options = {}) {
      const u = new URL(url);
      Object.entries(params).forEach(([k, v]) => u.searchParams.set(k, String(v)));
      try {
        const res = await fetch(u.toString(), { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' для ' + u.pathname);
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) return res.json();
        const text = await res.text();
        try { return JSON.parse(text); } catch { return { raw: text }; }
      } catch (err) {
        if (!options.silent) showGlobalError('Ошибка запроса: ' + (err?.message || err), err);
        else console.error('Ошибка запроса:', err);
        throw err;
      }
    }

    function extractRecordId(data) {
      return data?.record_id || data?.recordId || data?.id || data?.data?.record_id || null;
    }

    function extractStatus(data) {
      return data?.status || data?.data?.status || null;
    }

    function extractImageUrl(data) {
      return data?.image_url || data?.imageUrl || data?.data?.image_url || '';
    }

    function extractPrompt(data) {
      return data?.prompt || data?.data?.prompt || '';
    }

    function extractPostText(data) {
      return data?.text || data?.post_text || data?.caption || data?.data?.text || data?.data?.post_text || '';
    }

    async function loadBalance() {
      try {
        const data = await apiGet(WEBHOOKS.balance, {}, { silent: true });
        const openrouter = data?.openrouter ?? data?.data?.openrouter;
        const kieai = data?.kieai ?? data?.data?.kieai;
        if (openrouter == null || kieai == null) return;
        el.balanceOpenrouter.textContent = 'OpenRouter: ' + openrouter;
        el.balanceKieai.textContent = 'KieAI: ' + kieai;
        el.balanceRow.style.display = 'flex';
      } catch (e) {
        console.error('Баланс не загружен:', e);
      }
    }

    async function startPolling(recordId) {
      const started = Date.now();
      currentRecordId = recordId;
      el.error.textContent = '';
      showScreen('loading');

      while (Date.now() - started < POLL_TIMEOUT) {
        const s = await apiGet(WEBHOOKS.status, { record_id: currentRecordId });
        const status = extractStatus(s);

        if (status === 'ready') {
          currentImageUrl = extractImageUrl(s);
          const readyPrompt = extractPrompt(s);
          if (readyPrompt) currentPrompt = readyPrompt;
          if (!currentImageUrl) throw new Error('Нет image_url в статусе');
          el.img.src = currentImageUrl;
          showScreen('result');
          return;
        }

        if (status !== 'pending') {
          throw new Error('Неожиданный статус: ' + status);
        }

        await new Promise(r => setTimeout(r, POLL_INTERVAL));
      }

      throw new Error('timeout');
    }

    async function startTelegramPolling(recordId) {
      const started = Date.now();
      currentRecordId = recordId;
      el.error.textContent = '';
      showScreen('loading');

      while (Date.now() - started < POLL_TIMEOUT) {
        const s = await apiGet(WEBHOOKS.telegramStatus, { record_id: currentRecordId });
        const status = extractStatus(s);
        if (status === 'ready') {
          currentImageUrl = extractImageUrl(s);
          const txt = extractPostText(s);
          if (txt) currentText = txt;
          if (currentImageUrl) {
            el.telegramImage.src = currentImageUrl;
            el.telegramTextWithImage.textContent = currentText;
            showScreen('telegramResult');
          } else {
            el.telegramTextOnly.textContent = currentText;
            showScreen('telegramText');
          }
          return;
        }
        if (status !== 'pending') throw new Error('Неожиданный статус: ' + status);
        await new Promise(r => setTimeout(r, POLL_INTERVAL));
      }

      throw new Error('timeout');
    }

    async function runWithLoading(task) {
      try {
        clearGlobalError();
        el.error.textContent = '';
        showScreen('loading');
        await task();
      } catch (e) {
        console.error(e);
        showGlobalError(e.message || 'Неизвестная ошибка', e);
        el.error.textContent = e.message === 'timeout' ? 'Попробуйте ещё раз' : ('Ошибка: ' + e.message);
      }
    }

    async function startAuto() {
      await runWithLoading(async () => {
        const data = await apiGet(WEBHOOKS.auto);
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        currentPrompt = extractPrompt(data);
        await startPolling(id);
      });
    }

    async function startTelegramAuto() {
      await runWithLoading(async () => {
        const data = await apiGet(WEBHOOKS.telegramAuto);
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startTelegramPolling(id);
      });
    }

    async function startTelegramManualText() {
      await runWithLoading(async () => {
        const data = await apiGet(WEBHOOKS.telegramManualText, {
          topic: el.telegramTopic.value,
          post_type: el.telegramPostType.value
        });
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startTelegramPolling(id);
      });
    }

    async function startManual() {
      await runWithLoading(async () => {
        currentPrompt = el.prompt.value.trim();
        const data = await apiGet(WEBHOOKS.manual, {
          scene_style: el.scene.value,
          mounting_type: el.mount.value,
          color: el.color.value,
          prompt: currentPrompt
        });
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startPolling(id);
      });
    }

    async function regenerate() {
      await runWithLoading(async () => {
        if (!currentRecordId) throw new Error('record_id отсутствует');

        const statusData = await apiGet(WEBHOOKS.status, { record_id: currentRecordId });
        const statusPrompt = extractPrompt(statusData);
        if (statusPrompt) currentPrompt = statusPrompt;
        if (!currentPrompt) throw new Error('В ответе status нет поля prompt');

        const data = await apiGet(WEBHOOKS.regenerate, {
          record_id: currentRecordId,
          prompt: currentPrompt
        });
        const newId = extractRecordId(data);
        if (!newId) throw new Error('Новый record_id не получен');
        await startPolling(newId);
      });
    }

    async function telegramRegenerateText() {
      await runWithLoading(async () => {
        if (!currentRecordId) throw new Error('record_id отсутствует');
        const data = await apiGet(WEBHOOKS.telegramRegenerateText, {
          record_id: currentRecordId,
          topic: el.telegramTopic.value,
          post_type: el.telegramPostType.value
        });
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startTelegramPolling(id);
      });
    }

    async function telegramGenerateImage() {
      await runWithLoading(async () => {
        if (!currentRecordId) throw new Error('record_id отсутствует');
        const imagePrompt = currentText || extractPrompt(await apiGet(WEBHOOKS.telegramStatus, { record_id: currentRecordId }));
        const data = await apiGet(WEBHOOKS.telegramManualImage, {
          record_id: currentRecordId,
          image_prompt: imagePrompt
        });
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startTelegramPolling(id);
      });
    }

    async function telegramRegenerateImage() {
      await runWithLoading(async () => {
        if (!currentRecordId) throw new Error('record_id отсутствует');
        const imagePrompt = currentText || extractPrompt(await apiGet(WEBHOOKS.telegramStatus, { record_id: currentRecordId }));
        const data = await apiGet(WEBHOOKS.telegramRegenerateImage, {
          record_id: currentRecordId,
          image_prompt: imagePrompt
        });
        const id = extractRecordId(data);
        if (!id) throw new Error('record_id не получен');
        await startTelegramPolling(id);
      });
    }

    async function telegramPublish() {
      await runWithLoading(async () => {
        if (!currentRecordId) throw new Error('record_id отсутствует');
        await apiGet(WEBHOOKS.telegramPublish, { record_id: currentRecordId });
        showScreen('telegram');
      });
    }

    document.getElementById('go-pinterest').onclick = () => {
      clearGlobalError();
      currentPlatform = 'pinterest';
      showScreen('platform');
    };
    document.getElementById('go-telegram').onclick = () => {
      clearGlobalError();
      currentPlatform = 'telegram';
      showScreen('telegram');
    };
    document.getElementById('platform-back').onclick = () => {
      clearGlobalError();
      showScreen('main');
    };
    document.getElementById('manual-open').onclick = () => {
      clearGlobalError();
      showScreen('manual');
    };
    document.getElementById('manual-back').onclick = () => {
      clearGlobalError();
      showScreen('platform');
    };
    document.getElementById('result-back').onclick = () => {
      clearGlobalError();
      showScreen('platform');
    };
    document.getElementById('telegram-back').onclick = () => {
      clearGlobalError();
      showScreen('main');
    };
    document.getElementById('telegram-manual-open').onclick = () => {
      clearGlobalError();
      showScreen('telegramManual');
    };
    document.getElementById('telegram-manual-back').onclick = () => {
      clearGlobalError();
      showScreen('telegram');
    };
    document.getElementById('telegram-text-back').onclick = () => {
      clearGlobalError();
      showScreen('telegram');
    };
    document.getElementById('telegram-result-back').onclick = () => {
      clearGlobalError();
      showScreen('telegram');
    };

    document.getElementById('auto-create').onclick = startAuto;
    document.getElementById('manual-generate').onclick = startManual;
    document.getElementById('regenerate').onclick = regenerate;
    document.getElementById('telegram-auto-create').onclick = startTelegramAuto;
    document.getElementById('telegram-generate-text').onclick = startTelegramManualText;
    document.getElementById('telegram-regenerate-text').onclick = telegramRegenerateText;
    document.getElementById('telegram-generate-image').onclick = telegramGenerateImage;
    document.getElementById('telegram-recreate-text').onclick = telegramRegenerateText;
    document.getElementById('telegram-recreate-image').onclick = telegramRegenerateImage;
    document.getElementById('telegram-publish').onclick = telegramPublish;
    document.getElementById('download').onclick = () => {
      if (currentImageUrl) window.open(currentImageUrl, '_blank');
    };

    window.addEventListener('error', (event) => {
      const msg = event?.error?.message || event?.message || 'Глобальная ошибка';
      showGlobalError(msg, event?.error || event);
    });

    window.addEventListener('unhandledrejection', (event) => {
      const reason = event?.reason;
      const msg = reason?.message || String(reason || 'Необработанное отклонение Promise');
      showGlobalError(msg, reason || event);
    });

    if (!checkAccess()) {
      document.querySelector('.app').style.display = 'none';
      document.getElementById('access-denied').style.display = 'flex';
    } else {
      applyTelegramTheme();
      tg?.onEvent?.('themeChanged', applyTelegramTheme);
      loadBalance();
    }
  </script>
</body>
