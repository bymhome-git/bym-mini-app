<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Контент-завод</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f1014);
      --text: var(--tg-theme-text-color, #f2f3f7);
      --hint: var(--tg-theme-hint-color, #8f93a3);
      --button: var(--tg-theme-button-color, #6C63FF);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --card: var(--tg-theme-secondary-bg-color, #1a1c24);
      --accent: #6C63FF;
      --danger: #ff4d5d;
      --ok: #39d98a;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }

    body {
      padding: 18px 14px calc(26px + env(safe-area-inset-bottom));
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    .button {
      min-height: 48px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      cursor: default;
      opacity: 0.55;
      transform: none;
    }

    .app {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .screen {
      display: none;
      animation: fade 0.18s ease;
    }

    .screen.active {
      display: block;
    }

    #home.screen.active {
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      height: 100vh;
    }

    .home-actions {
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      min-height: 42vh;
      gap: 18px;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.16;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.2;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 14px;
      transition: all 0.2s ease;
    }

    .tap-card {
      cursor: pointer;
    }

    .tap-card:active {
      transform: scale(0.99);
    }

    .balance {
      margin-bottom: 18px;
      color: var(--hint);
      font-size: 15px;
    }

    .muted {
      color: var(--hint);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .platform-title,
    .status {
      font-weight: 700;
    }

    .status.done {
      color: var(--ok);
    }

    .status.processing,
    .status.queue {
      color: var(--accent);
    }

    .status.error {
      color: var(--danger);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented span {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: var(--card);
      color: var(--hint);
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .segmented input:checked + span {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    label.field {
      display: grid;
      gap: 7px;
      color: var(--hint);
      font-size: 13px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      outline: none;
      padding: 12px;
      background: var(--card);
      color: var(--text);
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .manual-box {
      display: none;
    }

    .manual-box.active {
      display: grid;
    }

    .hidden,
    .platform-extra.hidden {
      display: none !important;
    }

    .flow-block {
      margin-top: 14px;
    }

    .inline-select {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .inline-select select {
      width: 92px;
    }

    .generation-title {
      margin-bottom: 12px;
      font-weight: 700;
      line-height: 1.3;
    }

    .post-image {
      width: 100%;
      max-height: 460px;
      object-fit: cover;
      border-radius: 12px;
      background: var(--card);
      display: block;
    }

    .post-text {
      max-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    #generatedTextArea {
      min-height: 180px;
      max-height: 280px;
      overflow: auto;
    }

    .params {
      display: grid;
      gap: 8px;
    }

    .param-row {
      display: grid;
      grid-template-columns: minmax(110px, 0.7fr) 1fr;
      gap: 10px;
      font-size: 14px;
    }

    .param-key {
      color: var(--hint);
      word-break: break-word;
    }

    .param-value {
      word-break: break-word;
    }

    .params-accordion {
      padding: 12px 14px;
      cursor: pointer;
    }

    .params-accordion summary {
      list-style: none;
      font-weight: 600;
      font-size: 14px;
      color: var(--hint);
      padding: 2px 0;
    }

    .params-accordion summary::-webkit-details-marker {
      display: none;
    }

    .params-accordion[open] summary {
      margin-bottom: 10px;
    }

    .params-body {
      display: grid;
      gap: 8px;
    }

    .danger {
      background: var(--danger);
      color: #ffffff;
    }

    .secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .file-input {
      display: none;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .empty,
    .loading {
      padding: 18px 0;
      color: var(--hint);
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 20;
      max-width: 560px;
      margin: 0 auto;
      border-radius: 12px;
      padding: 13px 15px;
      background: rgba(28, 30, 38, 0.96);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: all 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 380px) {
      body {
        padding-left: 10px;
        padding-right: 10px;
      }

      h1 {
        font-size: 24px;
      }

      .segmented {
        grid-template-columns: 1fr;
      }

      .param-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="screen active">
      <h1>🏭 Контент-завод</h1>
      <div id="balance" class="balance">💰 Баланс OpenRouter: $—</div>
      <div class="home-actions">
        <button id="createBtn">Создать пост</button>
        <button id="generationsBtn">Генерации</button>
        <button id="addBtn">Добавить</button>
      </div>
    </section>

    <section id="platform" class="screen">
      <h2>Выберите платформу</h2>
      <div id="platformList" class="stack"></div>
    </section>

    <section id="settings" class="screen">
      <h2 id="settingsTitle">Платформа</h2>
      <div class="segmented">
        <label>
          <input type="radio" name="mode" value="auto" checked>
          <span>⚡ Авто</span>
        </label>
        <label>
          <input type="radio" name="mode" value="manual">
          <span>🎛 Ручная настройка</span>
        </label>
      </div>

      <div id="instagramSubtypeBox" class="flow-block hidden">
        <div class="segmented">
          <label>
            <input type="radio" name="contentSubtype" value="single" checked>
            <span>📷 Одно фото</span>
          </label>
          <label>
            <input type="radio" name="contentSubtype" value="carousel">
            <span>🎠 Карусель</span>
          </label>
        </div>
        <label id="carouselSlidesBox" class="field hidden">Количество слайдов
          <select id="carouselSlidesSelect">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </label>
      </div>

      <label id="autoCountBox" class="field flow-block">Количество постов
        <select id="autoPostCountSelect">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </label>

      <div id="pinterestManualBox" class="manual-box stack">
        <label class="field">Стиль<select id="styleSelect"></select></label>
        <label class="field">Цвет<select id="colorSelect"></select></label>
        <label class="field">Принт<select id="printSelect"></select></label>
        <label class="field">Материал<select id="materialSelect"></select></label>
      </div>

      <div id="textManualBox" class="manual-box stack">
        <label class="field">Тип поста<select id="postTypeSelect"></select></label>
        <label class="field">Тема поста<select id="postThemeSelect"></select></label>
      </div>

      <div class="stack" style="margin-top: 14px;">
        <button id="generateBtn">Сгенерировать</button>
      </div>

      <div id="textFlowBox" class="stack flow-block hidden">
        <div id="textStatus" class="loading">Ожидание текста...</div>
        <label class="field">Текст поста<textarea id="generatedTextArea"></textarea></label>
        <button id="regenerateTextBtn" class="secondary">🔄 Перегенерировать текст</button>
        <label class="field inline-select">Количество вариантов картинки
          <select id="imageCountSelect">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </label>
        <button id="generateImageBtn">🎨 Сгенерировать картинку</button>
      </div>
    </section>

    <section id="generations" class="screen">
      <h2>Генерации</h2>
      <div id="generationsList" class="stack"></div>
    </section>

    <section id="post" class="screen">
      <h2>Карточка поста</h2>
      <div id="postDetails" class="stack"></div>
    </section>

    <section id="add" class="screen">
      <h2>Добавить</h2>
      <div class="stack">
        <button id="photoAddBtn">📷 Добавить из фото</button>
        <button id="newTypeBtn">Новый тип поста</button>
        <button id="newThemeBtn">Новая тема поста</button>
      </div>
    </section>

    <section id="photo" class="screen">
      <h2>Добавить из фото</h2>
      <div class="stack">
        <button id="choosePhotoBtn">📷 Выбрать фото</button>
        <input id="photoInput" class="file-input" type="file" accept="image/*">
        <div id="photoResults" class="stack"></div>
      </div>
    </section>

    <section id="simpleForm" class="screen">
      <h2 id="simpleTitle">Новая запись</h2>
      <div class="stack">
        <label class="field">Краткое название<input id="simpleName" type="text" autocomplete="off"></label>
        <label class="field">Тех. описание<textarea id="simpleDescription"></textarea></label>
        <label class="check"><input id="simpleActive" type="checkbox" checked> Активно</label>
        <button id="simpleSaveBtn">Сохранить</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const API = {
      balance:        'https://bymzavod.online/webhook/openrouter-balance',
      newGeneration:  'https://bymzavod.online/webhook/new-generation',
      getGeneration:  'https://bymzavod.online/webhook/get-generation',
      getGenerations: 'https://bymzavod.online/webhook/get-generations',
      getReferences:  'https://bymzavod.online/webhook/get-references',
      analyzePhoto:   'https://bymzavod.online/webhook/analyze-photo',
      syncAirtable:   'https://bymzavod.online/webhook/pb-to-airtable',
      saveElement:    'https://bymzavod.online/webhook/save-element',
      deleteGen:      'https://bymzavod.online/webhook/delete-generation',
      regenerate:     'https://bymzavod.online/webhook/regenerate-generation',
    };

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    const screens = document.querySelectorAll('.screen');
    const toastEl = document.getElementById('toast');
    const balanceEl = document.getElementById('balance');
    const platformList = document.getElementById('platformList');
    const settingsTitle = document.getElementById('settingsTitle');
    const pinterestManualBox = document.getElementById('pinterestManualBox');
    const textManualBox = document.getElementById('textManualBox');
    const autoCountBox = document.getElementById('autoCountBox');
    const autoPostCountSelect = document.getElementById('autoPostCountSelect');
    const instagramSubtypeBox = document.getElementById('instagramSubtypeBox');
    const carouselSlidesBox = document.getElementById('carouselSlidesBox');
    const carouselSlidesSelect = document.getElementById('carouselSlidesSelect');
    const generateBtn = document.getElementById('generateBtn');
    const textFlowBox = document.getElementById('textFlowBox');
    const textStatus = document.getElementById('textStatus');
    const generatedTextArea = document.getElementById('generatedTextArea');
    const regenerateTextBtn = document.getElementById('regenerateTextBtn');
    const imageCountSelect = document.getElementById('imageCountSelect');
    const generateImageBtn = document.getElementById('generateImageBtn');
    const generationsList = document.getElementById('generationsList');
    const postDetails = document.getElementById('postDetails');
    const photoInput = document.getElementById('photoInput');
    const photoResults = document.getElementById('photoResults');
    const simpleTitle = document.getElementById('simpleTitle');
    const simpleName = document.getElementById('simpleName');
    const simpleDescription = document.getElementById('simpleDescription');
    const simpleActive = document.getElementById('simpleActive');
    const simpleSaveBtn = document.getElementById('simpleSaveBtn');

    const selects = {
      style: document.getElementById('styleSelect'),
      color: document.getElementById('colorSelect'),
      print: document.getElementById('printSelect'),
      material: document.getElementById('materialSelect'),
      postType: document.getElementById('postTypeSelect'),
      postTheme: document.getElementById('postThemeSelect'),
    };

    const platforms = [
      { key: 'pinterest', title: 'Pinterest', label: '📌 Pinterest' },
      { key: 'telegram', title: 'Telegram', label: '✈️ Telegram' },
      { key: 'instagram', title: 'Instagram', label: '📸 Instagram' },
      { key: 'dzen', title: 'Яндекс.Дзен', label: '📖 Яндекс.Дзен' },
    ];

    const statusMap = {
      done: '✅ Готово',
      processing: '⏳ Обработка',
      queue: '🕐 Ожидание',
      text_done: '📝 Текст готов',
      error: '❌ Ошибка',
    };

    const photoCollections = {
      style: { title: 'Стиль', collection: 'styles' },
      color: { title: 'Цвет', collection: 'colors' },
      print: { title: 'Принт', collection: 'prints' },
      material: { title: 'Материал', collection: 'materials' },
    };

    let currentScreen = 'home';
    let screenHistory = [];
    let selectedPlatform = null;
    let references = null;
    let generations = [];
    let selectedGeneration = null;
    let pollingTimer = null;
    let textPollingTimer = null;
    let activeTextGeneration = null;
    let activeTextParams = {};
    let simpleCollection = 'post_types';
    let toastTimer = null;

    function initTelegram() {
      if (!tg) return;
      tg.expand();
      tg.BackButton.onClick(goBack);
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
      });
      if (!response.ok) throw new Error('Ошибка сети');
      const text = await response.text();
      return text ? JSON.parse(text) : {};
    }

    function setButtonLoading(button, isLoading, text = 'Загрузка...') {
      if (!button) return;
      if (isLoading) {
        button.dataset.text = button.textContent;
        button.textContent = text;
        button.disabled = true;
      } else {
        button.textContent = button.dataset.text || button.textContent;
        button.disabled = false;
      }
    }

    function navigate(screen, push = true) {
      if (push && currentScreen !== screen) screenHistory.push(currentScreen);
      currentScreen = screen;
      screens.forEach(item => item.classList.toggle('active', item.id === screen));
      if (tg) {
        if (screen === 'home') tg.BackButton.hide();
        else tg.BackButton.show();
      }
      if (screen !== 'generations') stopPolling();
      if (screen !== 'settings') stopTextPolling();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goBack() {
      const previous = screenHistory.pop();
      if (previous) navigate(previous, false);
      else navigate('home', false);
    }

    function platformName(key) {
      const item = platforms.find(platform => platform.key === key);
      return item ? item.title : key || 'Не указано';
    }

    function formatDate(value) {
      if (!value) return 'Дата не указана';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString('ru-RU', {
        day: '2-digit',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function getImageUrl(item) {
      if (!item?.image_url) return '';
      if (/^https?:\/\//i.test(item.image_url)) return item.image_url;
      return `https://pb.bymzavod.online/api/files/generations/${item.id}/${item.image_url}`;
    }

    function getGenerationTitle(item) {
      const params = item.params && typeof item.params === 'object' ? item.params : {};
      if (params.post_theme) return params.post_theme;
      if (params.style && params.color) return `${params.style}, ${params.color}`;
      return 'Авто-генерация';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadBalance() {
      try {
        const data = await request(API.balance);
        const value = Number(data.balance);
        balanceEl.textContent = `💰 Баланс OpenRouter: $${Number.isFinite(value) ? value.toFixed(2) : '—'}`;
      } catch (error) {
        showToast(error.message || 'Не удалось загрузить баланс');
      }
    }

    function renderPlatforms() {
      platformList.innerHTML = platforms.map(platform => (
        `<button data-platform="${platform.key}">${platform.label}</button>`
      )).join('');
    }

    async function openSettings(platformKey) {
      selectedPlatform = platformKey;
      settingsTitle.textContent = platformName(platformKey);
      document.querySelector('input[name="mode"][value="auto"]').checked = true;
      document.querySelector('input[name="contentSubtype"][value="single"]').checked = true;
      resetTextFlow();
      updateSettingsView();
      navigate('settings');
      if (!references) await loadReferences();
    }

    async function loadReferences() {
      setButtonLoading(generateBtn, true);
      try {
        const data = await request(API.getReferences);
        references = {
          ...data,
          post_types: data.post_types || [],
          post_themes: data.post_themes || [],
        };
        fillSelect(selects.style, references.styles || []);
        fillSelect(selects.color, references.colors || []);
        fillSelect(selects.print, references.prints || []);
        fillSelect(selects.material, references.materials || []);
        fillSelect(selects.postType, references.post_types || []);
        fillSelect(selects.postTheme, references.post_themes || []);
      } catch (error) {
        showToast(error.message || 'Не удалось загрузить справочники');
      } finally {
        setButtonLoading(generateBtn, false);
      }
    }

    function fillSelect(select, items) {
      select.innerHTML = '<option value="">Не выбрано</option>' + items.map(item => (
        `<option value="${escapeHtml(item.id || item.short_name)}" data-name="${escapeHtml(item.short_name)}" data-description="${escapeHtml(item.tech_description || '')}">${escapeHtml(item.short_name)}</option>`
      )).join('');
    }

    function getSelected(select) {
      const option = select.options[select.selectedIndex];
      return {
        name: option ? option.dataset.name || '' : '',
        description: option ? option.dataset.description || '' : '',
      };
    }

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function isTextPlatform() {
      return selectedPlatform !== 'pinterest';
    }

    function resetTextFlow() {
      stopTextPolling();
      activeTextGeneration = null;
      activeTextParams = {};
      generatedTextArea.value = '';
      textStatus.textContent = 'Ожидание текста...';
      textStatus.classList.remove('hidden');
      textFlowBox.classList.add('hidden');
      generateBtn.classList.remove('hidden');
    }

    function updateSettingsView() {
      const mode = getMode();
      const textPlatform = isTextPlatform();
      const textReady = activeTextGeneration && !textFlowBox.classList.contains('hidden');
      const isCarousel = document.querySelector('input[name="contentSubtype"]:checked')?.value === 'carousel';

      pinterestManualBox.classList.toggle('active', selectedPlatform === 'pinterest' && mode === 'manual');
      textManualBox.classList.toggle('active', textPlatform && mode === 'manual' && !textReady);
      autoCountBox.classList.toggle('hidden', textReady);
      instagramSubtypeBox.classList.toggle('hidden', selectedPlatform !== 'instagram' || textReady);
      carouselSlidesBox.classList.toggle('hidden', !isCarousel || selectedPlatform !== 'instagram' || textReady);
      generateBtn.textContent = textPlatform ? 'Сгенерировать текст' : 'Сгенерировать';
    }

    function getGenerationId(data) {
      return data.generation_id || data.id || data?.data?.generation_id || data?.data?.id || '';
    }

    function buildTextParams() {
      const mode = getMode();
      const postType = getSelected(selects.postType);
      const postTheme = getSelected(selects.postTheme);
      const params = {
        post_type: mode === 'manual' ? postType.name : '',
        post_type_description: mode === 'manual' ? postType.description : '',
        post_theme: mode === 'manual' ? postTheme.name : '',
        post_theme_description: mode === 'manual' ? postTheme.description : '',
      };

      if (selectedPlatform === 'instagram') {
        const subtype = document.querySelector('input[name="contentSubtype"]:checked')?.value || 'single';
        if (subtype === 'carousel') {
          params.post_subtype = 'carousel';
          params.image_count = Number(carouselSlidesSelect.value);
        }
      }

      return params;
    }

    function buildPinterestParams(mode) {
      if (mode !== 'manual') return {};
      const style = getSelected(selects.style);
      const color = getSelected(selects.color);
      const print = getSelected(selects.print);
      const material = getSelected(selects.material);
      return {
        style: style.name,
        style_description: style.description,
        color: color.name,
        color_description: color.description,
        print: print.name,
        print_description: print.description,
        material: material.name,
        material_description: material.description,
      };
    }

    async function postNewGeneration(payload) {
      return request(API.newGeneration, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
    }

    async function createGeneration() {
      if (selectedPlatform === 'pinterest') {
        await createPinterestGeneration();
      } else {
        await createTextGeneration();
      }
    }

    async function createPinterestGeneration() {
      const mode = getMode();
      const count = Number(autoPostCountSelect.value);
      const params = buildPinterestParams(mode);
      setButtonLoading(generateBtn, true, 'Отправка...');
      try {
        for (let index = 0; index < count; index += 1) {
          await postNewGeneration({
            platform: selectedPlatform,
            mode,
            params,
          });
        }
        showToast(count > 1 ? `✅ Добавлено ${count} задачи в очередь` : '✅ Задача добавлена в очередь');
        navigate('home');
      } catch (error) {
        showToast(error.message || 'Не удалось создать задачу');
      } finally {
        setButtonLoading(generateBtn, false);
      }
    }

    async function createTextGeneration() {
      const mode = getMode();
      const count = Number(autoPostCountSelect.value);
      const params = buildTextParams();
      activeTextParams = params;
      setButtonLoading(generateBtn, true, 'Отправка...');
      try {
        let firstData = null;
        for (let index = 0; index < count; index += 1) {
          const data = await postNewGeneration({
            platform: selectedPlatform,
            mode,
            params,
          });
          if (!firstData) firstData = data;
        }

        if (count > 1) {
          showToast(`✅ Добавлено ${count} задачи в очередь`);
          navigate('home');
          return;
        }

        const generationId = getGenerationId(firstData || {});
        if (!generationId) throw new Error('Не получен ID генерации');
        activeTextGeneration = generationId;
        showTextLoading();
        startTextPolling(generationId);
      } catch (error) {
        showToast(error.message || 'Не удалось создать задачу');
      } finally {
        setButtonLoading(generateBtn, false);
      }
    }

    function showTextLoading() {
      generateBtn.classList.add('hidden');
      textFlowBox.classList.remove('hidden');
      textStatus.classList.remove('hidden');
      textStatus.textContent = 'Генерация текста...';
      generatedTextArea.value = '';
      generatedTextArea.disabled = true;
      regenerateTextBtn.textContent = '🔄 Перегенерировать текст';
      regenerateTextBtn.disabled = true;
      generateImageBtn.textContent = '🎨 Сгенерировать картинку';
      generateImageBtn.disabled = true;
      updateSettingsView();
    }

    function showTextReady(item) {
      stopTextPolling();
      textStatus.textContent = '📝 Текст готов';
      generatedTextArea.value = item.post_text || '';
      generatedTextArea.disabled = false;
      regenerateTextBtn.disabled = false;
      generateImageBtn.disabled = false;
      if (item.params && typeof item.params === 'object') activeTextParams = item.params;
    }

    function startTextPolling(generationId) {
      stopTextPolling();
      pollTextGeneration(generationId);
      textPollingTimer = setInterval(() => pollTextGeneration(generationId), 3000);
    }

    function stopTextPolling() {
      if (!textPollingTimer) return;
      clearInterval(textPollingTimer);
      textPollingTimer = null;
    }

    async function pollTextGeneration(generationId) {
      try {
        const data = await request(`${API.getGeneration}?id=${encodeURIComponent(generationId)}`);
        const item = Array.isArray(data) ? data[0] : data;
        if (item.status === 'text_done') showTextReady(item);
        if (item.status === 'error') {
          stopTextPolling();
          textStatus.textContent = item.error || 'Ошибка генерации текста';
          showToast('Ошибка генерации текста');
        }
      } catch (error) {
        stopTextPolling();
        showToast(error.message || 'Не удалось проверить статус');
      }
    }

    async function regenerateText() {
      if (!activeTextGeneration) return;
      setButtonLoading(regenerateTextBtn, true, 'Отправка...');
      try {
        const data = await postNewGeneration({
          platform: selectedPlatform,
          mode: getMode(),
          params: activeTextParams,
          regenerate: 'text',
          generation_id: activeTextGeneration,
        });
        activeTextGeneration = getGenerationId(data) || activeTextGeneration;
        showTextLoading();
        startTextPolling(activeTextGeneration);
      } catch (error) {
        showToast(error.message || 'Не удалось перегенерировать текст');
      } finally {
        if (!textPollingTimer) setButtonLoading(regenerateTextBtn, false);
      }
    }

    async function generateImageOnly() {
      if (!activeTextGeneration) return;
      setButtonLoading(generateImageBtn, true, 'Отправка...');
      try {
        await postNewGeneration({
          platform: selectedPlatform,
          mode: 'image_only',
          params: {
            generation_id: activeTextGeneration,
            image_count: Number(imageCountSelect.value),
          },
        });
        showToast('✅ Задача добавлена в очередь');
        navigate('home');
      } catch (error) {
        showToast(error.message || 'Не удалось создать картинку');
      } finally {
        setButtonLoading(generateImageBtn, false);
      }
    }

    async function loadGenerations(showLoading = true) {
      if (showLoading) generationsList.innerHTML = '<div class="loading">Загрузка...</div>';
      try {
        const data = await request(API.getGenerations);
        generations = Array.isArray(data) ? data : [];
        renderGenerations();
        const hasActive = generations.some(item => ['queue', 'processing', 'text_done'].includes(item.status));
        if (hasActive) startPolling();
        else stopPolling();
      } catch (error) {
        generationsList.innerHTML = '<div class="empty">Не удалось загрузить список</div>';
        showToast(error.message || 'Ошибка загрузки');
      }
    }

    function renderGenerations() {
      if (!generations.length) {
        generationsList.innerHTML = '<div class="empty">Генераций пока нет</div>';
        return;
      }
      generationsList.innerHTML = generations.map(item => {
        const status = item.status || 'queue';
        return `
          <article class="card tap-card" data-generation="${escapeHtml(item.id)}">
            <div class="generation-title">${escapeHtml(getGenerationTitle(item))}</div>
            <div class="row">
              <div class="muted">${escapeHtml(platformName(item.platform))}</div>
              <div class="status ${escapeHtml(status)}">${statusMap[status] || status}</div>
            </div>
          </article>
        `;
      }).join('');
    }

    function startPolling() {
      if (pollingTimer) return;
      pollingTimer = setInterval(() => loadGenerations(false), 5000);
    }

    function stopPolling() {
      if (!pollingTimer) return;
      clearInterval(pollingTimer);
      pollingTimer = null;
    }

    function openPost(id) {
      selectedGeneration = generations.find(item => String(item.id) === String(id));
      if (!selectedGeneration) {
        showToast('Запись не найдена');
        return;
      }
      renderPost();
      navigate('post');
    }

    function renderPost() {
      const item = selectedGeneration;
      const params = item.params && typeof item.params === 'object' ? item.params : {};
      const imageUrl = getImageUrl(item);

      const visibleParams = Object.entries(params).filter(([key]) => !key.endsWith('_description'));
      const paramsHtml = visibleParams.length
        ? `<details class="card params-accordion">
            <summary>📋 Параметры генерации</summary>
            <div class="params-body">
              ${visibleParams.map(([key, value]) => `
                <div class="param-row">
                  <div class="param-key">${escapeHtml(key)}</div>
                  <div class="param-value">${escapeHtml(typeof value === 'object' ? JSON.stringify(value) : String(value))}</div>
                </div>
              `).join('')}
            </div>
          </details>`
        : `<div class="muted" style="font-size:13px; padding: 4px 0;">Авто-режим — параметры выбраны ИИ</div>`;

      const errorHtml = item.status === 'error'
        ? `<div class="card"><div class="status error">❌ Ошибка</div><div class="muted" style="margin-top: 8px;">${escapeHtml(item.error_message || item.error || 'Текст ошибки не указан')}</div></div><button id="retryBtn">🔁 Повторить</button>`
        : '';

      const imageReady = !!imageUrl;
      const textOnlyReady = item.status === 'text_done' && !imageReady;
      const regenImageLabel = textOnlyReady ? '🎨 Сгенерировать картинку' : '🔄 Перегенерировать картинку';

      postDetails.innerHTML = `
        ${imageUrl ? `<img class="post-image" src="${escapeHtml(imageUrl)}" alt="Изображение поста">` : ''}
        ${item.post_text ? `<div class="card post-text">${escapeHtml(item.post_text)}</div>` : ''}
        ${paramsHtml}
        ${errorHtml}
        <button id="regenImageBtn">${regenImageLabel}</button>
        ${item.platform === 'pinterest' ? '' : '<button id="regenTextBtn">🔄 Перегенерировать текст</button>'}
        ${imageUrl ? '<button id="downloadImageBtn" class="secondary">⬇️ Скачать картинку</button>' : ''}
        <button id="deleteGenerationBtn" class="danger">🗑 Удалить</button>
      `;

      bindPostButtons();
    }

    function bindPostButtons() {
      const item = selectedGeneration;

      document.getElementById('regenImageBtn')?.addEventListener('click', async event => {
        const button = event.currentTarget;
        setButtonLoading(button, true, 'Отправка...');
        try {
          await request(API.regenerate, {
            method: 'POST',
            body: JSON.stringify({ generation_id: item.id }),
          });
          showToast('✅ Задача добавлена в очередь');
          navigate('generations');
          await loadGenerations();
        } catch (error) {
          showToast(error.message || 'Не удалось отправить задачу');
        } finally {
          setButtonLoading(button, false);
        }
      });

      document.getElementById('regenTextBtn')?.addEventListener('click', async event => {
        const button = event.currentTarget;
        setButtonLoading(button, true, 'Отправка...');
        try {
          await request(API.newGeneration, {
            method: 'POST',
            body: JSON.stringify({
              platform: item.platform,
              mode: item.mode || 'auto',
              params: item.params || {},
            }),
          });
          showToast('✅ Задача добавлена в очередь');
          navigate('generations');
          await loadGenerations();
        } catch (error) {
          showToast(error.message || 'Не удалось перегенерировать текст');
        } finally {
          setButtonLoading(button, false);
        }
      });

      document.getElementById('retryBtn')?.addEventListener('click', async event => {
        const button = event.currentTarget;
        setButtonLoading(button, true, 'Отправка...');
        try {
          await request(API.regenerate, {
            method: 'POST',
            body: JSON.stringify({ generation_id: item.id }),
          });
          showToast('✅ Повторная задача добавлена в очередь');
          navigate('generations');
          await loadGenerations();
        } catch (error) {
          showToast(error.message || 'Не удалось повторить');
        } finally {
          setButtonLoading(button, false);
        }
      });

      document.getElementById('downloadImageBtn')?.addEventListener('click', downloadImage);
      document.getElementById('deleteGenerationBtn')?.addEventListener('click', deleteGeneration);
    }

    async function postGeneration(payload, button) {
      setButtonLoading(button, true, 'Отправка...');
      try {
        await request(API.newGeneration, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        showToast('✅ Задача добавлена в очередь');
        navigate('home');
      } catch (error) {
        showToast(error.message || 'Не удалось отправить задачу');
      } finally {
        setButtonLoading(button, false);
      }
    }

    async function deleteGeneration(event) {
      const button = event.currentTarget;
      setButtonLoading(button, true, 'Удаление...');
      try {
        await request(API.deleteGen, {
          method: 'POST',
          body: JSON.stringify({ generation_id: selectedGeneration.id }),
        });
        showToast('✅ Удалено');
        navigate('generations');
        await loadGenerations();
      } catch (error) {
        showToast(error.message || 'Не удалось удалить');
      } finally {
        setButtonLoading(button, false);
      }
    }

    function downloadImage() {
      if (!selectedGeneration?.image_url) return;
      const link = document.createElement('a');
      link.href = getImageUrl(selectedGeneration);
      link.download = `post-${selectedGeneration.id || Date.now()}.jpg`;
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function openSimpleForm(collection, title) {
      simpleCollection = collection;
      simpleTitle.textContent = title;
      simpleName.value = '';
      simpleDescription.value = '';
      simpleActive.checked = true;
      navigate('simpleForm');
    }

    async function saveSimple() {
      const shortName = simpleName.value.trim();
      if (!shortName) {
        showToast('Укажите краткое название');
        return;
      }
      setButtonLoading(simpleSaveBtn, true);
      try {
        await request(API.saveElement, {
          method: 'POST',
          body: JSON.stringify({
            collection: simpleCollection,
            short_name: shortName,
            tech_description: simpleDescription.value.trim(),
            active: simpleActive.checked,
          }),
        });
        showToast('✅ Сохранено');
        navigate('add');
      } catch (error) {
        showToast(error.message || 'Не удалось сохранить');
      } finally {
        setButtonLoading(simpleSaveBtn, false);
      }
    }

    function choosePhoto() {
      photoInput.click();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Не удалось прочитать фото'));
        reader.readAsDataURL(file);
      });
    }

    async function analyzePhoto(file) {
      if (!file) return;
      const button = document.getElementById('choosePhotoBtn');
      setButtonLoading(button, true, 'Анализ...');
      photoResults.innerHTML = '';
      try {
        const image = await fileToBase64(file);
        const data = await request(API.analyzePhoto, {
          method: 'POST',
          body: JSON.stringify({ image }),
        });
        renderPhotoResults(data);
      } catch (error) {
        showToast(error.message || 'Не удалось проанализировать фото');
      } finally {
        setButtonLoading(button, false);
        photoInput.value = '';
      }
    }

    function renderPhotoResults(data) {
      photoResults.innerHTML = Object.entries(photoCollections).map(([key, meta]) => {
        const item = data[key] || {};
        return `
          <article class="card stack" data-photo-card="${key}">
            <div class="platform-title">${meta.title}</div>
            <label class="field">Название<input type="text" value="${escapeHtml(item.name || '')}" data-role="name"></label>
            <label class="field">Тех. описание<textarea data-role="description">${escapeHtml(item.tech_description || '')}</textarea></label>
            <button data-role="save">💾 Сохранить</button>
          </article>
        `;
      }).join('');
    }

    async function savePhotoCard(card) {
      const key = card.dataset.photoCard;
      const meta = photoCollections[key];
      const button = card.querySelector('[data-role="save"]');
      const shortName = card.querySelector('[data-role="name"]').value.trim();
      const description = card.querySelector('[data-role="description"]').value.trim();
      if (!shortName) {
        showToast('Укажите название');
        return;
      }
      setButtonLoading(button, true);
      try {
        await request(API.saveElement, {
          method: 'POST',
          body: JSON.stringify({
            collection: meta.collection,
            short_name: shortName,
            tech_description: description,
            active: true,
          }),
        });
        button.textContent = '✅ Сохранено';
        button.disabled = true;
      } catch (error) {
        showToast(error.message || 'Не удалось сохранить');
        setButtonLoading(button, false);
      }
    }

    function bindEvents() {
      document.getElementById('createBtn').addEventListener('click', () => navigate('platform'));
      document.getElementById('generationsBtn').addEventListener('click', async () => {
        navigate('generations');
        await loadGenerations();
      });
      document.getElementById('addBtn').addEventListener('click', () => navigate('add'));
      document.getElementById('photoAddBtn').addEventListener('click', () => navigate('photo'));
      document.getElementById('newTypeBtn').addEventListener('click', () => openSimpleForm('post_types', 'Новый тип поста'));
      document.getElementById('newThemeBtn').addEventListener('click', () => openSimpleForm('post_themes', 'Новая тема поста'));
      document.getElementById('choosePhotoBtn').addEventListener('click', choosePhoto);
      simpleSaveBtn.addEventListener('click', saveSimple);
      generateBtn.addEventListener('click', () => createGeneration());
      regenerateTextBtn.addEventListener('click', regenerateText);
      generateImageBtn.addEventListener('click', generateImageOnly);
      photoInput.addEventListener('change', event => analyzePhoto(event.target.files[0]));

      platformList.addEventListener('click', event => {
        const button = event.target.closest('[data-platform]');
        if (button) openSettings(button.dataset.platform);
      });

      document.querySelectorAll('input[name="mode"]').forEach(input => {
        input.addEventListener('change', () => {
          resetTextFlow();
          updateSettingsView();
        });
      });

      document.querySelectorAll('input[name="contentSubtype"]').forEach(input => {
        input.addEventListener('change', updateSettingsView);
      });

      generationsList.addEventListener('click', event => {
        const card = event.target.closest('[data-generation]');
        if (card) openPost(card.dataset.generation);
      });

      photoResults.addEventListener('click', event => {
        const button = event.target.closest('[data-role="save"]');
        const card = event.target.closest('[data-photo-card]');
        if (button && card) savePhotoCard(card);
      });
    }

    initTelegram();
    renderPlatforms();
    bindEvents();
    loadBalance();
  </script>
</body>
</html>
